<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crypto Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#131722] text-white font-sans">
    <nav class="bg-[#1c2030] border-b border-[#2a2e39] px-6 py-4 flex justify-between items-center">
        <span class="text-xl font-bold text-[#0ecb81]">AI CRYPTO</span>
        <div class="flex items-center space-x-6">
            <div class="flex bg-[#2a2e39] p-1 rounded-lg">
                <button id="demoBtn" onclick="switchMode('DEMO')" class="px-4 py-1.5 rounded-md text-sm bg-[#0ecb81]">Demo</button>
                <button id="realBtn" onclick="switchMode('REAL')" class="px-4 py-1.5 rounded-md text-sm text-gray-400">Real</button>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-400">Balance</p>
                <p id="walletBalance" class="text-lg font-bold text-[#0ecb81]">$10,000.00</p>
            </div>
            <div class="text-sm bg-[#2a2e39] px-3 py-2 rounded-lg">
                Trades: <span id="tradeCounter" class="font-bold text-amber-400">0/10</span>
            </div>
        </div>
    </nav>
    <main class="p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-[#1c2030] p-4 rounded-xl border border-[#2a2e39]">
                <div class="h-[400px]" id="crypto_live_chart"></div>
            </div>
            <div class="bg-[#1c2030] p-4 rounded-xl border border-[#2a2e39]">
                <h3 class="text-lg font-semibold mb-4">Active Trades</h3>
                <table class="w-full text-left"><tbody id="activeTradesLog"></tbody></table>
            </div>
        </div>
        <div class="bg-[#1c2030] p-6 rounded-xl border border-[#2a2e39] flex flex-col justify-between">
            <div id="signalBox" class="bg-emerald-950/40 border border-emerald-500/30 p-4 rounded-xl text-center mb-6">
                <h2 id="aiSignalText" class="text-2xl font-black text-emerald-400 animate-pulse">BUY BTC NOW</h2>
            </div>
            <input id="tradeAmountInput" type="number" value="1000" class="w-full bg-[#2a2e39] p-3 rounded-xl border border-[#454b57] text-lg mb-4">
            <button onclick="executeTrade()" class="w-full bg-[#0ecb81] py-4 rounded-xl font-bold">EXECUTE TRADE</button>
        </div>
    </main>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="app.js"></script>
</body>
</html>
